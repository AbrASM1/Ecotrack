global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["172.20.4.60:9093"]

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
  - job_name: node-exporter
    static_configs:
      - targets: ["172.20.4.70:9100"]
  - job_name: alertmanager
    static_configs:
      - targets: ["172.20.4.60:9093"]
  - job_name: grafana
    static_configs:
      - targets: ["172.20.4.50:3000"]
  - job_name: cadvisor
    static_configs:
      - targets: ["172.20.4.80:8080"]
  - job_name: postgres-exporter
    static_configs:
      - targets: ["172.20.4.90:9187"]
  - job_name: nginx-exporter
    static_configs:
      - targets: ["172.20.4.100:9113"]
  - job_name: iot-simulator
    static_configs:
      - targets: ["172.20.4.120:8000"]