filebeat.inputs:
  - type: log
    enabled: true
    paths:
      - /var/log/nginx/ecotrack_access.log
    fields:
      log_type: nginx-access
    fields_under_root: false

  - type: log
    enabled: true
    paths:
      - /var/log/nginx/ecotrack_error.log
    fields:
      log_type: nginx-error
    fields_under_root: false

  - type: log
    enabled: true
    paths:
      - /var/log/nginx/modsec_audit.log
    json.keys_under_root: true
    json.add_error_key: true
    json.message_key: log
    fields:
      log_type: modsecurity
    fields_under_root: false

  - type: log
    enabled: true
    paths:
      - /var/log/suricata/eve.json
    json.keys_under_root: true
    json.add_error_key: true
    fields:
      log_type: suricata
    fields_under_root: false

  - type: container
    enabled: true
    paths:
      - /var/lib/docker/containers/*/*.log

processors:
  - add_docker_metadata:
      host: "unix:///var/run/docker.sock"

  - drop_event:
      when:
        and:
          - has_fields: ["container.id"]
          - not:
              or:
                - contains:
                    container.name: "ecotrack-postgres"
                - contains:
                    container.name: "ecotrack-wireguard"

  - add_fields:
      target: fields
      fields:
        log_type: postgres
      when:
        contains:
          container.name: "ecotrack-postgres"

  - add_fields:
      target: fields
      fields:
        log_type: wireguard
      when:
        contains:
          container.name: "ecotrack-wireguard"

filebeat.config.modules:
  enabled: false

setup.ilm.enabled: false
setup.template.enabled: true
setup.template.name: "ecotrack"
setup.template.pattern: "ecotrack-*"
setup.template.settings:
  index.number_of_shards: 1
  index.number_of_replicas: 0

output.elasticsearch:
  hosts: ["https://wazuh.indexer:9200"]
  protocol: "https"
  username: "admin"
  password: "SecretPassword"
  ssl.certificate_authorities: ["/usr/share/filebeat/certs/root-ca.pem"]
  ssl.verification_mode: "certificate"
  index: "ecotrack-%{[fields.log_type]:misc}-%{+yyyy.MM.dd}"

logging.level: info
logging.to_files: false