SecRule REQUEST_URI "@rx ^/api/" \
    "id:9000001,\
    phase:2,\
    deny,\
    status:403,\
    t:none,t:lowercase,\
    msg:'ECOTRACK-SQLI custom SQL injection attempt on API endpoint',\
    logdata:'Matched %{MATCHED_VAR_NAME}: %{MATCHED_VAR}',\
    tag:'ECOTRACK',\
    tag:'attack-sqli',\
    tag:'application-multi',\
    severity:'CRITICAL',\
    chain"
    SecRule ARGS|ARGS_NAMES|REQUEST_BODY "@rx (?i:union[\s/*]+select|insert[\s/*]+into|drop[\s/*]+table|update[\s/*]+.+[\s/*]+set|delete[\s/*]+from|or[\s/*]+1[\s/*]*=[\s/*]*1|('|%27)[\s/*]*or[\s/*]|;[\s/*]*--|sleep[\s/*]*\(|benchmark[\s/*]*\(|information_schema|pg_sleep[\s/*]*\()" \
        "t:none,t:urlDecodeUni,t:lowercase,t:removeNulls"

SecRule REQUEST_HEADERS:User-Agent "@rx (?i:sqlmap|nikto|nmap|masscan|nessus|dirbuster|gobuster|wpscan|nuclei|acunetix|zgrab|fimap|wfuzz|hydra|netsparker|arachni)" \
    "id:9000002,\
    phase:1,\
    deny,\
    status:403,\
    t:none,\
    msg:'ECOTRACK-SCANNER security scanner user-agent blocked',\
    logdata:'UA: %{MATCHED_VAR}',\
    tag:'ECOTRACK',\
    tag:'attack-scanner',\
    severity:'CRITICAL'"