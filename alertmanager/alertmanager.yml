global:
  resolve_timeout: 5m

route:
  receiver: webhook-local
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h
  routes:
    - matchers: ['severity="critical"']
      receiver: webhook-local
      group_wait: 10s
      repeat_interval: 1h

receivers:
  - name: webhook-local
    webhook_configs:
      - url: "http://172.20.4.140:8080/"
        send_resolved: true

  # Pour notifier Slack ou Discord, basculer 'route.receiver' sur 'chat' et renseigner l'URL.
  # Discord : ajouter le suffixe /slack a l'URL du webhook Discord.
  - name: chat
    slack_configs:
      - api_url: "https://hooks.slack.com/services/REMPLACER/PAR/VOTRE_WEBHOOK"
        channel: "#alertes"
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }} ({{ .CommonLabels.severity }})'
        text: >-
          {{ range .Alerts }}*{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          {{ end }}

inhibit_rules:
  - source_matchers: ['severity="critical"']
    target_matchers: ['severity="warning"']
    equal: ["alertname"]